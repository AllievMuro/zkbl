<svg viewBox="0 0 512 512" width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="zkbl-grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <filter id="zkbl-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="zkbl-softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#10181C"/>

  <!-- Subtle background glow -->
  <circle cx="256" cy="248" r="130" fill="#14B8A6" opacity="0.05"/>

  <!-- GLYPH RUNE - Central asymmetric cryptic symbol -->
  <!-- Outer diamond frame - slightly rotated/asymmetric -->
  <g filter="url(#zkbl-glow)">
    <!-- Main diamond outline -->
    <polygon points="256,108 362,234 256,380 150,234" fill="none" stroke="url(#zkbl-grad1)" stroke-width="2.5" opacity="0.6"/>

    <!-- Inner diamond rotated -->
    <polygon points="272,152 338,248 240,340 174,240" fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0.4"/>

    <!-- Vertical spine - asymmetric -->
    <line x1="256" y1="108" x2="256" y2="380" stroke="url(#zkbl-grad1)" stroke-width="2" opacity="0.3"/>

    <!-- Horizontal cross bar - offset upward -->
    <line x1="150" y1="234" x2="362" y2="234" stroke="url(#zkbl-grad1)" stroke-width="2" opacity="0.3"/>

    <!-- Primary rune strokes - angular asymmetric paths -->
    <!-- Left descending bar -->
    <path d="M 210 170 L 174 240 L 196 300" fill="none" stroke="url(#zkbl-grad1)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Right ascending bar -->
    <path d="M 302 168 L 338 248 L 318 308" fill="none" stroke="url(#zkbl-grad1)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Central crossbar with gap (ZK proof concept - partial reveal) -->
    <path d="M 196 220 L 238 220" fill="none" stroke="#2DD4BF" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 272 220 L 318 220" fill="none" stroke="#2DD4BF" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Lower crossbar - full -->
    <path d="M 192 272 L 320 272" fill="none" stroke="#2DD4BF" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Apex serif marks -->
    <path d="M 244 108 L 256 96 L 268 108" fill="none" stroke="#2DD4BF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Nadir serif marks -->
    <path d="M 244 380 L 256 392 L 268 380" fill="none" stroke="#2DD4BF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Left node dot -->
    <circle cx="174" cy="240" r="4" fill="#2DD4BF"/>
    <!-- Right node dot -->
    <circle cx="338" cy="248" r="4" fill="#2DD4BF"/>
    <!-- Top node dot -->
    <circle cx="256" cy="108" r="4" fill="#14B8A6"/>
    <!-- Bottom node dot -->
    <circle cx="256" cy="380" r="4" fill="#14B8A6"/>

    <!-- Angled rune tick - left -->
    <path d="M 200 196 L 222 188" fill="none" stroke="#14B8A6" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Angled rune tick - right -->
    <path d="M 290 290 L 314 282" fill="none" stroke="#14B8A6" stroke-width="2.5" stroke-linecap="round"/>

  </g>

  <!-- Wordmark -->
  <text x="256" y="448" font-family="'Courier New', monospace" font-size="28" font-weight="700" fill="#F0FDFA" text-anchor="middle" letter-spacing="10" opacity="0.9">ZKBL</text>

  <!-- Tagline dots -->
  <circle cx="218" cy="468" r="2" fill="#14B8A6" opacity="0.6"/>
  <circle cx="256" cy="468" r="2" fill="#14B8A6" opacity="0.6"/>
  <circle cx="294" cy="468" r="2" fill="#14B8A6" opacity="0.6"/>
</svg>